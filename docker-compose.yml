services:
  kopesa-loan-api:
    image: 010309/kopesa-loan-platform:latest
    container_name: kopesa-loan-api
    restart: unless-stopped
    ports:
      - "3352:8080"
    environment:
      PORT: "8080"
      JWT_SECRET: "${JWT_SECRET:-kopesa-prod-secret}"
      CASSANDRA_HOSTS: "${CASSANDRA_HOSTS:-safer.easipath.com}"
      CASSANDRA_PORT: "${CASSANDRA_PORT:-9042}"
      CASSANDRA_USERNAME: "${CASSANDRA_USERNAME:-}"
      CASSANDRA_PASSWORD: "${CASSANDRA_PASSWORD:-}"
      CASSANDRA_KEYSPACE: "${CASSANDRA_KEYSPACE:-kopesa_loan_platform}"
      CASSANDRA_DATACENTER: "${CASSANDRA_DATACENTER:-datacenter1}"
      PROVIDER_BASE_URL: "${PROVIDER_BASE_URL:-https://cloudcalls.easipath.com/backend-email-service/api/v1}"
      DROPBOX_BASE_URL: "${DROPBOX_BASE_URL:-https://cloudcalls.easipath.com/backend-biatechdropbox/api}"
      WHATSAPP_BASE_URL: "${WHATSAPP_BASE_URL:-http://safer.easipath.com:8080}"
      WHATSAPP_API_KEY: "${WHATSAPP_API_KEY:-mUtombo8544e4EGG25841serEEESSA}"
      WHATSAPP_INSTANCE: "${WHATSAPP_INSTANCE:-biacibenga}"
      EMAIL_FROM: "${EMAIL_FROM:-no-reply@mails.biacibenga.co.za}"
